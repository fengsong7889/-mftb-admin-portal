server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mftb-admin
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mftb_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    # 请改为你本地 MySQL 的密码
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mftb.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 密钥（生产环境请使用更复杂的密钥，并通过环境变量注入）
  secret: mftb-admin-jwt-secret-key-please-change-in-production-2024
  # Token 有效期（毫秒）默认 24 小时
  expiration: 86400000
  # Token 请求头名称
  header: Authorization
  # Token 前缀
  prefix: "Bearer "

logging:
  level:
    com.mftb.admin: debug
